<html>

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="resources/logo.ico">
</head>

<body>

    <div id="menu-container">
        <img src="resources/logo.png" id="logo-menu">
        <div id="menu-options">
            <label for="player-name">Nombre del Jugador:</label>
            <input type="text" id="player-name" placeholder="Escribe tu nombre">
            <button id="start-button">Iniciar Partida</button>
            <button id="players-button">Jugadores: 1</button>
        </div>
    </div>

    <div id="game-area">

        <div id="quiz-container">
            <h3>Jugador 2: Preguntas</h3>
            <hr>
            <div id="quiz-feedback"></div>
            <div id="question-area">
                <p id="question-text">Cargando pregunta...</p>
            </div>
            <div id="answer-options">
                </div>
        </div>
        
        
        <div id="wrapper">
            <div id="left-div">
                <img src="resources/logo.png" id="logo">
                <hr>
                <div id="score-div">
                    <label style="font-family: 'Author', sans-serif;"> Score: </label>
                    <label id="score"></label>
                </div>
                <div id="lines-div">
                    <label style="font-family: 'Author', sans-serif;"> Lines: </label>
                    <label id="lines"></label>
                </div>
            </div>
            <div id="game-container">
                <img src="resources/background.png" id="background">
                <canvas id="game-canvas"></canvas>
                <div id="game-over-modal">
                    <h2>Game Over</h2>
                    <div class="modal-button-container">
                        <button id="restart-button">Reiniciar</button>
                        <button id="menu-button">Menú</button>
                    </div>
                </div>
            </div>
        </div>

    </div> </body>

<script src="script.js"></script>

</html>
